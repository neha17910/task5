<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App | PRODIGY INFOTECH</title>
  <style>
    :root{
      --bg1:#07111f;
      --bg2:#0b1b35;
      --card:#101a33;
      --card2:#172342;
      --text:#f5f8ff;
      --muted:#a8b2d8;
      --accent:#7c5cff;
      --accent2:#22c55e;
      --line:rgba(255,255,255,.08);
      --shadow:0 22px 60px rgba(0,0,0,.42);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,92,255,.24), transparent 25%),
        radial-gradient(circle at top right, rgba(34,197,94,.16), transparent 22%),
        linear-gradient(160deg,var(--bg1),var(--bg2));
      display:grid;
      place-items:center;
      padding:20px;
    }
    .app{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr 330px;
      gap:22px;
    }
    .card{
      background:rgba(16,26,51,.82);
      border:1px solid var(--line);
      backdrop-filter:blur(18px);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .main{
      padding:26px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }
    .brand h1{
      font-size:clamp(1.8rem,3vw,2.6rem);
      line-height:1.05;
      letter-spacing:-.04em;
    }
    .brand p{
      color:var(--muted);
      margin-top:6px;
      font-size:.95rem;
    }
    .pill{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:.9rem;
      white-space:nowrap;
    }
    .searchbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    .searchbar input{
      flex:1;
      min-width:220px;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(7,11,22,.7);
      color:#fff;
      outline:none;
      font-size:1rem;
    }
    .searchbar input:focus{
      border-color:rgba(124,92,255,.7);
      box-shadow:0 0 0 4px rgba(124,92,255,.12);
    }
    .btn{
      border:0;
      border-radius:16px;
      padding:14px 18px;
      font-weight:800;
      cursor:pointer;
      transition:transform .15s ease, opacity .2s ease;
      color:#fff;
      white-space:nowrap;
    }
    .btn:hover{transform:translateY(-2px)}
    .btn.primary{background:linear-gradient(135deg,var(--accent),#9b8cff)}
    .btn.secondary{background:linear-gradient(135deg,var(--accent2),#43d17a)}
    .btn.ghost{background:rgba(255,255,255,.08);border:1px solid var(--line)}
    .status{
      min-height:48px;
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:.95rem;
    }
    .status.error{color:#ff8aa0}
    .status.loading{color:#b9c4ff}
    .spinner{
      width:18px;height:18px;border-radius:50%;
      border:2px solid rgba(255,255,255,.18);
      border-top-color:#fff;
      animation:spin 1s linear infinite;
      display:none;
    }
    .status.loading .spinner{display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hero{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:18px;
      align-items:stretch;
    }
    .weather-now{
      padding:22px;
      background:linear-gradient(135deg, rgba(124,92,255,.15), rgba(34,197,94,.08));
      border:1px solid var(--line);
      border-radius:24px;
    }
    .location{
      font-size:1.05rem;
      color:#dfe5ff;
      margin-bottom:8px;
      font-weight:700;
    }
    .description{
      color:var(--muted);
      text-transform:capitalize;
      margin-bottom:14px;
    }
    .temperature{
      font-size:clamp(3.2rem,9vw,5.8rem);
      font-weight:900;
      line-height:1;
      letter-spacing:-.06em;
    }
    .feels{
      color:var(--muted);
      margin-top:10px;
      line-height:1.6;
    }
    .weather-icon{
      width:100px;
      height:100px;
      margin-top:10px;
      filter:drop-shadow(0 12px 24px rgba(0,0,0,.2));
    }
    .metrics{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }
    .metric{
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
    }
    .metric span{
      color:var(--muted);
      font-size:.86rem;
    }
    .metric strong{
      display:block;
      font-size:1.35rem;
      margin-top:6px;
      font-variant-numeric:tabular-nums;
    }
    .side{
      padding:22px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    .panel{
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      border-radius:20px;
      padding:18px;
    }
    .panel h2{
      font-size:1.05rem;
      margin-bottom:12px;
    }
    .forecast{
      display:grid;
      gap:10px;
    }
    .forecast-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
    }
    .forecast-item small{color:var(--muted)}
    .forecast-item strong{font-size:1rem}
    .tip{
      color:var(--muted);
      line-height:1.7;
      font-size:.94rem;
    }
    @media (max-width: 960px){ .app,.hero{grid-template-columns:1fr} }
    @media (max-width: 600px){
      .main,.side{padding:16px}
      .metrics{grid-template-columns:1fr}
      .searchbar input,.btn{width:100%}
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="card main">
      <div class="header">
        <div class="brand">
          <h1>Weather Pulse</h1>
          <p>Live weather by city or current location</p>
        </div>
        <div class="pill">PRODIGY INFOTECH</div>
      </div>

      <div class="searchbar">
        <input type="text" id="cityInput" placeholder="Enter city name, e.g. Jaipur" />
        <button class="btn primary" id="searchBtn">Search</button>
        <button class="btn secondary" id="locationBtn">Use My Location</button>
      </div>

      <div class="status" id="statusBox">
        <span class="spinner"></span>
        <span id="statusText">Search a city or use your current location.</span>
      </div>

      <section class="hero">
        <div class="weather-now">
          <div class="location" id="locationName">--</div>
          <div class="description" id="weatherDesc">No data loaded yet</div>
          <div class="temperature" id="temp">--°C</div>
          <div class="feels" id="feelsLike">Feels like --</div>
          <img class="weather-icon" id="weatherIcon" alt="Weather icon" style="display:none" />
        </div>

        <div class="metrics">
          <div class="metric">
            <span>Humidity</span>
            <strong id="humidity">--%</strong>
          </div>
          <div class="metric">
            <span>Wind Speed</span>
            <strong id="wind">-- kph</strong>
          </div>
          <div class="metric">
            <span>Pressure</span>
            <strong id="pressure">-- mb</strong>
          </div>
          <div class="metric">
            <span>Cloud</span>
            <strong id="cloud">--%</strong>
          </div>
        </div>
      </section>
    </main>

    <aside class="card side">
      <div class="panel">
        <h2>Weather Details</h2>
        <div class="forecast" id="detailsList">
          <div class="forecast-item"><small>City</small><strong>--</strong></div>
        </div>
      </div>

      <div class="panel">
        <h2>Quick Cities</h2>
        <div class="forecast">
          <button class="btn ghost" data-city="Jaipur">Jaipur</button>
          <button class="btn ghost" data-city="Delhi">Delhi</button>
          <button class="btn ghost" data-city="Mumbai">Mumbai</button>
          <button class="btn ghost" data-city="London">London</button>
        </div>
      </div>

      <div class="panel">
        <h2>Note</h2>
      </div>
    </aside>
  </div>

  <script>
    const apiKey = "6044e6c5e7fd49d5826124053261804";
    const baseUrl = "https://api.weatherapi.com/v1/current.json";

    const cityInput = document.getElementById("cityInput");
    const searchBtn = document.getElementById("searchBtn");
    const locationBtn = document.getElementById("locationBtn");
    const statusBox = document.getElementById("statusBox");
    const statusText = document.getElementById("statusText");
    const locationName = document.getElementById("locationName");
    const weatherDesc = document.getElementById("weatherDesc");
    const temp = document.getElementById("temp");
    const feelsLike = document.getElementById("feelsLike");
    const weatherIcon = document.getElementById("weatherIcon");
    const humidity = document.getElementById("humidity");
    const wind = document.getElementById("wind");
    const pressure = document.getElementById("pressure");
    const cloud = document.getElementById("cloud");
    const detailsList = document.getElementById("detailsList");

    function setStatus(type, message) {
      statusBox.className = "status" + (type ? ` ${type}` : "");
      statusText.textContent = message;
    }

    function updateUI(data) {
      const d = data.current;
      const loc = data.location;

      locationName.textContent = `${loc.name}, ${loc.region || loc.country}`;
      weatherDesc.textContent = d.condition.text;
      temp.textContent = `${d.temp_c}°C`;
      feelsLike.textContent = `Feels like ${d.feelslike_c}°C`;
      humidity.textContent = `${d.humidity}%`;
      wind.textContent = `${d.wind_kph} kph`;
      pressure.textContent = `${d.pressure_mb || "--"} mb`;
      cloud.textContent = `${d.cloud}%`;
      weatherIcon.src = `https:${d.condition.icon}`;
      weatherIcon.style.display = "block";

      detailsList.innerHTML = `
        <div class="forecast-item"><small>Country</small><strong>${loc.country}</strong></div>
        <div class="forecast-item"><small>Region</small><strong>${loc.region || "N/A"}</strong></div>
        <div class="forecast-item"><small>Local Time</small><strong>${loc.localtime}</strong></div>
        <div class="forecast-item"><small>Condition</small><strong>${d.condition.text}</strong></div>
      `;
    }

    async function fetchWeather(city) {
      if (!city.trim()) {
        setStatus("error", "Please enter a city name.");
        return;
      }

      setStatus("loading", `Fetching weather for ${city}...`);

      try {
        const res = await fetch(`${baseUrl}?key=${apiKey}&q=${encodeURIComponent(city)}&aqi=yes`);
        const data = await res.json();

        if (data.error) throw new Error(data.error.message || "Weather API error");

        updateUI(data);
        setStatus("", `Showing weather for ${data.location.name}.`);
      } catch (err) {
        setStatus("error", "City not found or API error. Try another place.");
      }
    }

    async function fetchByLocation(lat, lon) {
      setStatus("loading", "Fetching weather for your location...");

      try {
        const res = await fetch(`${baseUrl}?key=${apiKey}&q=${lat},${lon}&aqi=yes`);
        const data = await res.json();

        if (data.error) throw new Error(data.error.message || "Weather API error");

        updateUI(data);
        setStatus("", "Showing weather for your current location.");
      } catch (err) {
        setStatus("error", "Unable to fetch weather for your location.");
      }
    }

    searchBtn.addEventListener("click", () => fetchWeather(cityInput.value));
    cityInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") fetchWeather(cityInput.value);
    });

    locationBtn.addEventListener("click", () => {
      if (!navigator.geolocation) {
        setStatus("error", "Geolocation is not supported by your browser.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => fetchByLocation(pos.coords.latitude, pos.coords.longitude),
        () => setStatus("error", "Location permission denied.")
      );
    });

    document.querySelectorAll("[data-city]").forEach(btn => {
      btn.addEventListener("click", () => fetchWeather(btn.dataset.city));
    });

    fetchWeather("Jaipur");
  </script>
</body>
</html>
